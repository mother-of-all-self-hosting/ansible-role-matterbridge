---
# Project source code URL: https://github.com/42wim/matterbridge

matterbridge_enabled: true

matterbridge_identifier: matterbridge
matterbridge_base_path: "/{{ matterbridge_identifier }}"
matterbridge_config_path: "{{ matterbridge_base_path }}/config"
matterbridge_toml_path: "{{ matterbridge_config_path }}/matterbridge.toml"

# renovate: datasource=docker depName=42wim/matterbridge versioning=semver
matterbridge_version: 1.26.0

matterbridge_uid: ""
matterbridge_gid: ""

matterbridge_container_image: "{{ matterbridge_container_image_registry_prefix }}42wim/matterbridge:{{ matterbridge_container_image_tag }}"
matterbridge_container_image_tag: "{{ matterbridge_version }}"
matterbridge_container_image_registry_prefix: "{{ matterbridge_container_image_registry_prefix_upstream }}"
matterbridge_container_image_registry_prefix_upstream: "{{ matterbridge_container_image_registry_prefix_upstream_default }}"
matterbridge_container_image_registry_prefix_upstream_default: docker.io/
matterbridge_container_image_force_pull: "{{ matterbridge_container_image.endswith(':latest') }}"

matterbridge_container_image_self_build: false
matterbridge_container_image_self_build_name: "42wim/matterbridge:{{ matterbridge_container_image_self_build_repo_version }}"
matterbridge_container_image_self_build_repo: "https://github.com/42wim/matterbridge.git"
matterbridge_container_image_self_build_repo_version: "{{ 'v' + matterbridge_version if matterbridge_version != 'latest' else 'main' }}"
matterbridge_container_image_self_build_src_files_path: "{{ matterbridge_base_path }}/docker-src"

# The base container network. It will be auto-created by this role if it doesn't exist already.
matterbridge_container_network: "{{ matterbridge_identifier }}"

# Control if the container network is deleted on uninstalling.
matterbridge_container_network_deletion_enabled: true

# A list of extra arguments to pass to the container (`docker create` command)
matterbridge_container_extra_arguments: "{{ matterbridge_container_extra_arguments_auto + matterbridge_container_extra_arguments_custom }}"
matterbridge_container_extra_arguments_auto: []
matterbridge_container_extra_arguments_custom: []

# List of systemd services that the Matterbridge systemd service depends on
matterbridge_systemd_required_services_list: "{{ matterbridge_systemd_required_services_list_default + matterbridge_systemd_required_services_list_auto + matterbridge_systemd_required_services_list_custom }}"
matterbridge_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
matterbridge_systemd_required_services_list_auto: []
matterbridge_systemd_required_services_list_custom: []

# List of systemd services that the Matterbridge systemd service wants
matterbridge_systemd_wanted_services_list: "{{ matterbridge_systemd_wanted_services_list_default + matterbridge_systemd_wanted_services_list_auto + matterbridge_systemd_wanted_services_list_custom }}"
matterbridge_systemd_wanted_services_list_default: []
matterbridge_systemd_wanted_services_list_auto: []
matterbridge_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
matterbridge_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
matterbridge_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
matterbridge_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
matterbridge_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ matterbridge_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ matterbridge_container_stop_grace_time_seconds }} {{ matterbridge_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ matterbridge_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ matterbridge_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ matterbridge_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ matterbridge_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ matterbridge_identifier }} after {{ matterbridge_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

matterbridge_configuration_toml:
  accounts: []
  gateways: []

# Specify the timezone
matterbridge_environment_variables_tz: UTC

# Additional environment variables.
matterbridge_environment_variables_additional_variables: ""

# matterbridge_restart_necessary controls whether the Matterbridge systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
matterbridge_restart_necessary: false
